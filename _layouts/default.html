<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      {% if page.title and page.title != site.title %}{{ page.title }} · {% endif %}{{ site.title }}
    </title>
    <meta
      name="description"
      content="{{ page.title | default: site.description | strip_html | normalize_whitespace | escape }}"
    />
    <link rel="stylesheet" href="{{ '/assets/css/styles.css' | relative_url }}" />
  </head>
  <body>
    <div class="page-shell{% if page.page_shell_class %} {{ page.page_shell_class }}{% endif %}">
      {{ content }}
    </div>
  </body>
</html>
